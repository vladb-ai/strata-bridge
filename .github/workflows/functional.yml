name: Functional tests

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  extract-rust-version:
    name: Extract toolchain version
    runs-on: ubuntu-latest
    outputs:
      nightly-version: ${{ steps.extract-version.outputs.nightly-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract Rust version
        id: extract-version
        uses: ./.github/actions/extract-rust-version

  discover-groups:
    name: Discover functional test groups
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.list.outputs.groups }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: List test group directories
        id: list
        run: |
          # Keep in sync with SKIP_GROUPS_BY_DEFAULT in functional-tests/entry.py
          groups=$(find functional-tests/tests -mindepth 1 -maxdepth 1 -type d -not -name proofs -printf '%f\n' \
            | sort \
            | jq -R . \
            | jq -sc .)
          if [ "$groups" = "[]" ]; then
            echo "ERROR: no test groups found under functional-tests/tests" >&2
            exit 1
          fi
          echo "groups=$groups" >> "$GITHUB_OUTPUT"
          echo "Discovered groups: $groups"

  lint:
    name: Lint functional test files
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          working-directory: functional-tests
          activate-environment: true
          enable-cache: true
          cache-suffix: "functional-tests"
          python-version: "3.12"

      - name: Check formatting
        working-directory: functional-tests
        run: uv run ruff format --check

      - name: Check types
        working-directory: functional-tests
        run: uv run ty check

      - name: Lint
        working-directory: functional-tests
        run: uv run ruff check

  run:
    name: Run functional tests and generate report (${{ matrix.group }})
    runs-on: ubuntu-latest
    needs: [extract-rust-version, discover-groups]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJson(needs.discover-groups.outputs.groups) }}
    env:
      OPENSSL_VERSION: "3.5.0"
      OPENSSL_CACHE_VERSION: "v2" # update this to refresh cache
      OPENSSL_INSTALL_DIR: ${{ github.workspace }}/.cache/openssl-3.5.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore cached OpenSSL build
        id: cache-openssl
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.OPENSSL_INSTALL_DIR }}
          key: ${{ runner.os }}-openssl-${{ env.OPENSSL_VERSION }}-${{ env.OPENSSL_CACHE_VERSION }}

      - name: Download and build OpenSSL
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          curl -fsSLO "https://www.openssl.org/source/openssl-$OPENSSL_VERSION.tar.gz"
          tar -xzf "openssl-$OPENSSL_VERSION.tar.gz"
          cd "openssl-$OPENSSL_VERSION"
          ./config --prefix="$OPENSSL_INSTALL_DIR" --openssldir="$OPENSSL_INSTALL_DIR"
          make -j"$(nproc)"
          make install_sw install_ssldirs

      - name: Configure OpenSSL environment
        run: |
          OPENSSL_LIB_DIR="$OPENSSL_INSTALL_DIR/lib64"
          if [ ! -d "$OPENSSL_LIB_DIR" ]; then
            OPENSSL_LIB_DIR="$OPENSSL_INSTALL_DIR/lib"
          fi
          {
            echo "OPENSSL_ROOT_DIR=$OPENSSL_INSTALL_DIR"
            echo "OPENSSL_DIR=$OPENSSL_INSTALL_DIR"
            echo "PKG_CONFIG_PATH=$OPENSSL_LIB_DIR/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
            echo "LD_LIBRARY_PATH=$OPENSSL_LIB_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          } >> "$GITHUB_ENV"
          echo "$OPENSSL_INSTALL_DIR/bin" >> "$GITHUB_PATH"

      - name: Cleanup space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]

      - name: Install bitcoind
        env:
          BITCOIND_VERSION: "30.2"
          BITCOIND_ARCH: "x86_64-linux-gnu"
        run: |
          curl -fsSLO --proto "=https" --tlsv1.2 "https://bitcoincore.org/bin/bitcoin-core-$BITCOIND_VERSION/bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"
          curl -fsSLO --proto "=https" --tlsv1.2 "https://bitcoincore.org/bin/bitcoin-core-$BITCOIND_VERSION/SHA256SUMS"
          sha256sum --ignore-missing --check SHA256SUMS
          tar xzf "bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"
          sudo install -m 0755 -t /usr/local/bin "bitcoin-$BITCOIND_VERSION"/bin/*
          bitcoind --version
          rm -rf SHA256SUMS "bitcoin-$BITCOIND_VERSION" "bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"

      - name: Install Rust toolchain
        env:
          RUST_NIGHTLY: ${{ needs.extract-rust-version.outputs.nightly-version }}
        run: |
          rustup toolchain install "$RUST_NIGHTLY" --profile minimal --component llvm-tools-preview
          rustup default "$RUST_NIGHTLY"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@58e862542551f667fa44c8a2a4a1d64ad477c96a # v2.75.17
        with:
          tool: cargo-llvm-cov

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          cache-on-failure: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          working-directory: functional-tests
          activate-environment: true
          enable-cache: true
          cache-suffix: "functional-tests"

      - name: Install libclang for bindgen
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Setup FoundationDB client
        uses: ./.github/actions/setup-foundationdb

      - name: Setup FoundationDB server
        uses: ./.github/actions/setup-foundationdb-server

      - name: Build Cargo project
        run: |
          COV_TARGET_DIR="$GITHUB_WORKSPACE/target/llvm-cov-target"
          RUSTFLAGS="-Cinstrument-coverage" cargo build --locked --bin strata-bridge --target-dir "$COV_TARGET_DIR"
          RUSTFLAGS="-Cinstrument-coverage" cargo build --locked -p secret-service --bin secret-service --target-dir "$COV_TARGET_DIR"
          cargo build --locked --bin dev-cli --target-dir "$COV_TARGET_DIR"

      - name: Resolve external binary versions
        id: bin-versions
        run: |
          MOSAIC_REV=$(grep 'mosaic-rpc-api.*rev' Cargo.toml | sed 's/.*rev = "\([^"]*\)".*/\1/')
          if [ -z "$MOSAIC_REV" ]; then
            echo "ERROR: failed to extract mosaic rev from Cargo.toml" >&2
            exit 1
          fi
          ASM_REV=$(grep 'strata-asm-worker.*rev' Cargo.toml | sed 's/.*rev = "\([^"]*\)".*/\1/')
          if [ -z "$ASM_REV" ]; then
            echo "ERROR: failed to extract asm rev from Cargo.toml" >&2
            exit 1
          fi
          {
            echo "mosaic-rev=$MOSAIC_REV"
            echo "asm-rev=$ASM_REV"
          } >> "$GITHUB_OUTPUT"

      - name: Restore cached mosaic binary
        id: cache-mosaic
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/target/mosaic
          key: ${{ runner.os }}-mosaic-${{ steps.bin-versions.outputs.mosaic-rev }}-${{ needs.extract-rust-version.outputs.nightly-version }}

      - name: Install mosaic binary
        if: steps.cache-mosaic.outputs.cache-hit != 'true'
        env:
          MOSAIC_REV: ${{ steps.bin-versions.outputs.mosaic-rev }}
        run: |
          # `--locked` forces use of mosaic's committed Cargo.lock so its transitive
          # ckt-gobble dependency (declared without a rev, so otherwise floating to
          # ckt `main`) is pinned to the commit mosaic was built against. Without it
          # a moving ckt `main` yields a binary incompatible with the bridge.
          cargo install --locked --git https://github.com/alpenlabs/mosaic --rev "$MOSAIC_REV" --features=reduced-circuits --root "$GITHUB_WORKSPACE/target/mosaic" mosaic

      - name: Add mosaic binary to PATH
        run: |
          echo "$GITHUB_WORKSPACE/target/mosaic/bin" >> "$GITHUB_PATH"

      - name: Restore cached asm-runner binary
        id: cache-asm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/target/asm
          key: ${{ runner.os }}-asm-runner-${{ steps.bin-versions.outputs.asm-rev }}-${{ needs.extract-rust-version.outputs.nightly-version }}

      - name: Install asm binary
        if: steps.cache-asm.outputs.cache-hit != 'true'
        env:
          ASM_REV: ${{ steps.bin-versions.outputs.asm-rev }}
        run: |
          cargo install --locked --git https://github.com/alpenlabs/asm --rev "$ASM_REV" --root "$GITHUB_WORKSPACE/target/asm" strata-asm-runner

      - name: Add asm binary to PATH
        run: |
          echo "$GITHUB_WORKSPACE/target/asm/bin" >> "$GITHUB_PATH"

      - name: Run functional tests
        id: funcTestsRun
        continue-on-error: true
        env:
          NO_COLOR: "1"
          LOG_LEVEL: "info"
          PYTHON_VERSION: "3.12" # NOTE: (@Rajil1213) build fails with 3.13 since bitcoinlib (>=0.7.5,<0.8) uses an old version of numpy
          TEST_GROUP: ${{ matrix.group }}
          shell: bash
        run: |
          export LLVM_PROFILE_FILE="$GITHUB_WORKSPACE/target/llvm-cov-target/strata-%p-%m.profraw"
          NEWPATH="$GITHUB_WORKSPACE/target/llvm-cov-target/debug"
          export PATH="$NEWPATH:$PATH"
          echo "$PATH"
          echo "Making sure built binaries are available"
          which strata-bridge
          which secret-service
          which dev-cli
          cd functional-tests
          source ./env.bash
          uv run --python "$PYTHON_VERSION" python entry.py -g "$TEST_GROUP"

      - name: Generate combined coverage lcov
        id: genFunctionalLcov
        continue-on-error: true
        env:
          TEST_GROUP: ${{ matrix.group }}
        run: |
          # cargo-llvm-cov expects default target dir and adds llvm-cov-target itself
          export CARGO_TARGET_DIR="$GITHUB_WORKSPACE/target"
          export LLVM_PROFILE_FILE="$GITHUB_WORKSPACE/target/llvm-cov-target/strata-%p-%m.profraw"
          cargo llvm-cov report --lcov > "lcov.functional.${TEST_GROUP}.info"
      - name: Upload coverage lcov artifact
        if: steps.genFunctionalLcov.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: functional-lcov-${{ matrix.group }}
          path: lcov.functional.${{ matrix.group }}.info

      - name: Zip log files on failure
        if: steps.funcTestsRun.outcome == 'failure'
        # Create a zip archive (logs.zip) that includes only service.log files,
        # preserving the folder structure starting from functional-tests/_dd
        # NOTE: (MdTeach) Entire _dd could end up hundreds of MBs, so keep only logs
        run: |
          # service logs
          find functional-tests/_dd -type f -name "service.log" | zip -@ logs.zip
          # functional test logs
          zip -r logs.zip functional-tests/_dd -i '*/logs/*.log'

      - name: Upload logs as build artifact on failure
        if: steps.funcTestsRun.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fntest_dd-${{ matrix.group }}
          path: logs.zip
          retention-days: 30
          if-no-files-found: error
          compression-level: 0 # already compressed

      - name: Fail job if functional tests fail
        if: steps.funcTestsRun.outcome == 'failure'
        run: |
          echo "Functional tests failed"
          exit 1

  functional-tests-success:
    name: Check that all checks pass
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, discover-groups, run]
    timeout-minutes: 60
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
